# =============================================================================
# GitHub Actions Workflow: Deploy devops-demo-app to DigitalOcean
# =============================================================================

name: Deploy to Droplet

on:
  push:
    branches: [main]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Copy files to Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          password: ${{ secrets.DROPLET_PASSWORD }}
          source: "server.js,package.json,package-lock.json,public/"
          target: /opt/devops-demo-app
          overwrite: true

      - name: Restart application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          password: ${{ secrets.DROPLET_PASSWORD }}
          script: |
            cd /opt/devops-demo-app

            npm install --omit=dev

            # Stop any running instance
            pkill -f "node server.js" || true
            sleep 2

            # Start app (fixed: use nohup instead of setsid)
            nohup node server.js > deploy.log 2>&1 &

            # Wait for startup
            sleep 5

            echo "Checking health..."

            # Verify health endpoint (fail if not working)
            curl -v http://localhost:3000/health || exit 1

            echo "Deploy successful"
            exit 0
